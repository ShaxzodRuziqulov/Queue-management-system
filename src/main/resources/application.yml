server:
  port: 9092
app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  security:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
security:
  jwt:
    secret-key: ${SECRET_KEY:f72456084250dd5fa5b18eafffe4cdc1dbdcb36fa0e3608eb85d13b67705ce44}
    expiration-time: 86400000
    refresh-expiration-time: 604800000
spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        default_schema: public