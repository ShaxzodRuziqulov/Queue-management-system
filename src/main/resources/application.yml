server:
  port: 9092

app:
  security:
    jwt:
      secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    cors:
      allowed-origins:
        - "*"
    admin-bootstrap: true
    admin-login: ${API_ADMIN_USER:admin}
    admin-password: ${API_ADMIN_PASSWORD:admin}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qms}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
