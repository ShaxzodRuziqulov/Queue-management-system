version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: qms_db
    restart: always
    environment:
      POSTGRES_DB: qms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - qms_network

  app:
    build: .
    container_name: qms_app
    restart: always
    ports:
      - "80:9092"  # E'tibor bering: Serverning 80 porti (HTTP) ichkaridagi 9092 portga ulanmoqda
    environment:
      - DB_URL=jdbc:postgresql://db:5432/qms
      - DB_USERNAME=postgres
      - DB_PASSWORD=123
      - JWT_SECRET=supersecretkeyformyqueuemanagementsystemsupersecretkey
      - JWT_EXPIRATION_MS=86400000
    depends_on:
      - db
    networks:
      - qms_network

networks:
  qms_network:
    driver: bridge

volumes:
  pgdata:
